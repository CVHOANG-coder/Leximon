name: leximon
description: "Leximon - Learn English & collect mystical creatures across islands."
publish_to: "none"

version: 0.1.0+1

environment:
    sdk: ^3.11.5

dependencies:
    flutter:
        sdk: flutter
    flutter_localizations:
        sdk: flutter

    cupertino_icons: ^1.0.8

    # Game engine
    flame: ^1.18.0
    flame_audio: ^2.10.0

    # State management
    flutter_riverpod: ^2.5.1

    # Routing
    go_router: ^14.6.2

    # Models
    equatable: ^2.0.5

    # UI helpers
    flutter_screenutil: ^5.9.3
    google_fonts: ^6.2.1
    flutter_svg: ^2.0.10+1
    lottie: ^3.1.3
    archive: ^4.0.0

    # Local storage
    shared_preferences: ^2.3.3
    sqflite: ^2.4.1
    path: ^1.9.0

    # Text-to-speech (on-device, ONNX)
    supertonic_flutter: ^1.0.0
    audioplayers: ^6.1.0
    path_provider: ^2.1.5

dev_dependencies:
    flutter_test:
        sdk: flutter
    flutter_lints: ^6.0.0

flutter:
    uses-material-design: true

    assets:
        - lib/data/sample/
        - assets/images/
        - assets/images/homeScreen/
        - assets/images/homeScreen/islands/
        - assets/images/homeScreen/clouds/
        - assets/images/homeScreen/decor_item/
        - assets/images/homeScreen/decor_item/shark_shadow/
        - assets/images/checkpoint/
        - assets/images/checkpoint/checkpointCurrent/
        - assets/images/learningIslandScreen/
        - assets/images/learningIslandScreen/animals/
        - assets/images/card_frame/
        - assets/images/eggs/
        - assets/images/task/
        - assets/images/bags/
        - assets/images/popup_gift/
        - assets/svgs/
        - assets/lotties/
